<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FrostAir — климатические системы</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="theme-cold">

  <div class="side-air left" aria-hidden="true"></div>
  <div class="side-air right" aria-hidden="true"></div>

  <header class="site-header">
    <div class="wrap">
      <div class="logo">FrostAir<span class="dot">.</span></div>
      <nav>
        <a href="#hero">Главная</a>
        <a href="#catalog">Каталог</a>
        <a href="#about">О нас</a>
      </nav>
      <a href="#contacts" class="cta">Заказать</a>
    </div>
  </header>

  <section id="hero" class="hero">
    <div class="wrap">
      <div class="hero-inner">
        <div class="hero-content">
          <h1>Комфорт в одно <br><span class="accent">касание</span></h1>
          <p class="lead">Интеллектуальный климат. Нажмите на кнопку <b>Power</b> на кондиционере для смены режима.</p>
          <div class="hero-actions">
            <a href="#catalog" class="btn">Каталог моделей</a>
          </div>
        </div>

        <div class="ac-unit-container">
          <div class="ac-unit">
            <div class="ac-body">
              <div class="ac-display"><span id="temp-display">18°C</span></div>
              <div class="ac-vent"></div>
              <button id="themeToggle" class="ac-power-btn"><i class="fa-solid fa-power-off"></i></button>
            </div>
            <div class="air-flow-down"><span></span><span></span><span></span><span></span></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section id="catalog" class="catalog">
    <div class="wrap">
      <h2>Каталог систем</h2>
      <div id="productsGrid" class="products-grid"></div>
    </div>
  </section>

  <footer id="contacts" class="footer">
    <div class="wrap">
      <p>© <span id="year"></span> FrostAir — Технологии комфорта</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
